name: Smoke Test - Tier 1 (URL Validation)

on:
  push:
    branches:
      - master

concurrency:
  group: smoke-tier1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier1:
    name: Tier 1 - URL Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install smoke-test dependencies
        working-directory: tools/smoke-test
        run: bun install

      - name: Run Tier 1 URL checks
        working-directory: tools/smoke-test
        continue-on-error: true
        run: bun run tier1

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-tier1-reports
          path: tools/smoke-test/reports/
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Smoke Tier 1 Results
          path: tools/smoke-test/reports/tier1-junit.xml
          reporter: java-junit
          fail-on-error: false
