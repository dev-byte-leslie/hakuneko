name: Dead Link Scanner

on:
  schedule:
    - cron: '0 3 * * 1'   # Monday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: dead-link-scanner
  cancel-in-progress: true

jobs:
  scan:
    name: Scan connector URLs
    runs-on: ubuntu-latest
    timeout-minutes: 40      # 30 min scan + 10 min buffer
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        working-directory: tools/connector-gen
        run: bun install

      - name: Run dead link scan
        working-directory: tools/connector-gen
        run: bun run scan --output=json
        continue-on-error: true

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dead-link-report-${{ github.run_id }}
          path: tools/connector-gen/reports/dead-links-*.json
          retention-days: 90

      - name: Create or update GitHub issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportsDir = 'tools/connector-gen/reports';

            if (!fs.existsSync(reportsDir)) {
              console.log('No reports directory — scan may have produced no output.');
              return;
            }

            const files = fs.readdirSync(reportsDir)
              .filter(f => f.startsWith('dead-links-') && f.endsWith('.json'));

            if (!files.length) {
              console.log('No report file generated.');
              return;
            }

            const report = JSON.parse(
              fs.readFileSync(`${reportsDir}/${files[0]}`, 'utf8')
            );

            // Ensure labels exist (GitHub returns 422 if they don't)
            for (const label of ['dead-links', 'automated']) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: 'ededed',
                });
              } catch (e) {
                if (e.status !== 422) throw e; // 422 = already exists
              }
            }

            // Close all open issues with both labels to avoid accumulation
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dead-links,automated',
              state: 'open',
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed previous report issue #${issue.number}`);
            }

            // Create new report issue
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dead Link Report - ${report.scanDate}`,
              body: report.markdownBody,
              labels: ['dead-links', 'automated'],
            });
            console.log(`Created issue #${created.data.number}: ${created.data.html_url}`);
