# https://help.github.com/en/articles/workflow-syntax-for-github-actions
# https://help.github.com/en/articles/contexts-and-expression-syntax-for-github-actions

name: Continuous Integration

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  integration:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run --auto-servernum npx jest --runInBand --forceExit --testPathIgnorePatterns="e2e|connector-gen"
        timeout-minutes: 10
        env:
          DISPLAY: ':99.0'
          ELECTRON_DISABLE_SANDBOX: 1

      - name: Run tests (non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: npx jest --runInBand --forceExit --testPathIgnorePatterns="e2e|connector-gen"
        timeout-minutes: 10

      - name: Security audit
        run: npm audit --audit-level=high || true

  connector-gen-tests:
    name: Connector Gen Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install connector-gen dependencies
        working-directory: tools/connector-gen
        run: bun install

      - name: Run connector-gen tests
        working-directory: tools/connector-gen
        run: bun test
