# https://help.github.com/en/articles/workflow-syntax-for-github-actions
# https://help.github.com/en/articles/contexts-and-expression-syntax-for-github-actions

name: Continuous Integration

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-integration:
    # macOS and Windows removed: Electron 8.5.5 has no arm64 macOS build (macos-13 retired),
    # and Windows npm install hangs on Electron download. Re-add after Electron upgrade.
    name: Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Starting X Virtual Frame Buffer (Port 99)
        timeout-minutes: 2
        run: |
          sudo /usr/bin/Xvfb -ac :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          disown -ar

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        timeout-minutes: 5

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
        timeout-minutes: 5

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('bun.lock', 'src/app/bun.lock') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install NPM Packages
        timeout-minutes: 10
        run: npm install

      - name: Security Audit
        timeout-minutes: 5
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Lint
        timeout-minutes: 10
        run: npm run lint

      - name: Build (web)
        timeout-minutes: 15
        run: npm run build:web

      - name: Test
        timeout-minutes: 15
        env:
          DISPLAY: ':99'
          ELECTRON_DISABLE_SANDBOX: '1'
        run: npm run test -- --coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu
          path: coverage/
          retention-days: 14
        timeout-minutes: 5

  connector-gen-tests:
    name: Connector Gen Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install connector-gen dependencies
        working-directory: tools/connector-gen
        run: bun install

      - name: Run connector-gen tests
        working-directory: tools/connector-gen
        run: bun test
