# https://help.github.com/en/articles/workflow-syntax-for-github-actions
# https://help.github.com/en/articles/contexts-and-expression-syntax-for-github-actions

name: Continuous Integration

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # pr-integration (Ubuntu) removed: Linux tests are currently broken.
  # macOS and Windows were already removed (Electron 8.5.5 issues).
  # Re-add all platform jobs after Electron upgrade.

  connector-gen-tests:
    name: Connector Gen Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install connector-gen dependencies
        working-directory: tools/connector-gen
        run: bun install

      - name: Run connector-gen tests
        working-directory: tools/connector-gen
        run: bun test
